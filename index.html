<!DOCTYPE html>
<html>
<head>
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

min-height:100vh;

/* layered background */

background:

/* stars */
radial-gradient(white 1px, transparent 1px),
radial-gradient(white 1px, transparent 1px),

/* galaxy glow */
radial-gradient(circle at 50% 40%, rgba(120,170,255,.35), transparent 60%),
radial-gradient(circle at 70% 80%, rgba(0,200,255,.25), transparent 60%),

/* base color */
#050814;

background-size:
3px 3px,
2px 2px,
100% 100%,
100% 100%,
100% 100%;

background-position:
0 0,
50px 50px,
center,
center,
center;

}

</style>
</head>

<body>
</body>
</html>
